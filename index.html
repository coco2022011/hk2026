<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港。行 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #f5f0e6; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .paper-texture { 
            position: fixed; inset: 0; pointer-events: none; opacity: 0.05; z-index: 100;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        // 使用 htm 庫，讓你不需要 Babel 也能寫類似 HTML 的語法
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import htm from 'https://esm.sh/htm';
        import * as Lucide from 'https://esm.sh/lucide-react';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const html = htm.bind(React.createElement);

        // --- Firebase 配置 (請自行填入) ---
        const firebaseConfig = { 
            apiKey: "AIzaSyDvYWGfyFZb2TNbug8NXZrAzNMmv7DwlEM", 
            authDomain: "hk-travel-1c9bc.firebaseapp.com", 
            projectId: "hk-travel-1c9bc", 
            storageBucket: "hk-travel-1c9bc.firebasestorage.app", 
            messagingSenderId: "502792710467", 
            appId: "1:502792710467:web:4034ebba5a301e9777a7f6" 
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const appId = 'hk-travel-2026-v-final-safe-v20';

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [selectedDay, setSelectedDay] = useState(1);
            const [isEditing, setIsEditing] = useState(false);
            const [clickCount, setClickCount] = useState(0);

            const [itinerary, setItinerary] = useState([]);

            useEffect(() => {
                signInAnonymously(auth);
                onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                // 網管最後提醒規格：if (snap.exists) 不加括號
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', 'main'), (snap) => {
                    if (snap.exists) setItinerary(JSON.parse(snap.data().json || "[]"));
                });
            }, [user]);

            const handleHeaderClick = () => {
                const count = clickCount + 1;
                setClickCount(count);
                if (count >= 5) {
                    setIsEditing(!isEditing);
                    alert(isEditing ? "編輯模式已關閉" : "管理員模式已開啟 ✨");
                    setClickCount(0);
                }
            };

            const navTabs = [
                { id: 'home', icon: 'Calendar', label: '行程' },
                { id: 'must', icon: 'ShoppingBag', label: '清單' },
                { id: 'expense', icon: 'Receipt', label: '分帳' },
                { id: 'mtr', icon: 'LayoutGrid', label: '地鐵' },
                { id: 'tools', icon: 'Languages', label: '工具' },
                { id: 'calc', icon: 'BookOpen', label: '記事' }
            ];

            if (!user) return html`<div className="flex h-screen items-center justify-center opacity-20 text-[10px] tracking-[0.5em]">CONNECTING...</div>`;

            return html`
                <div className="max-w-md mx-auto bg-[#f5f0e6] min-h-screen relative pb-32">
                    <div className="paper-texture"></div>

                    <header className="pt-12 pb-8 px-6 text-center border-b border-[#ede0d4] cursor-pointer" onClick=${handleHeaderClick}>
                        <div className="flex items-center justify-center gap-3">
                            <${Lucide.Anchor} className="text-[#9c6644]" size=${24} />
                            <h2 className="text-[#e87a90] text-3xl font-black tracking-[0.3em]">香港。行</h2>
                        </div>
                        <p className="text-[9px] text-[#a69685] font-black uppercase tracking-[0.5em] mt-2">March 2026 / Adventure</p>
                    </header>

                    <main className="p-5">
                        ${activeTab === 'home' && html`
                            <div className="space-y-6">
                                <div className="flex justify-center gap-3">
                                    ${[1, 2, 3, 4].map(d => html`
                                        <button key=${d} onClick=${() => setSelectedDay(d)} className=${`w-10 h-10 rounded-xl font-black ${selectedDay === d ? 'bg-[#7f5539] text-white shadow-lg' : 'bg-white text-[#8e7d6f]'}`}>
                                            ${d}
                                        </button>
                                    `)}
                                </div>
                                <div className="bg-white rounded-[2rem] p-6 shadow-xl border border-[#ede0d4] text-center py-20">
                                    <p className="opacity-30 italic text-sm">數據已連線至 Firestore...現正顯示 Day ${selectedDay}</p>
                                    ${isEditing && html`<button className="mt-4 text-xs bg-rose-50 text-rose-500 p-2 rounded-lg border border-rose-100">+ 增加行程點</button>`}
                                </div>
                            </div>
                        `}
                        ${activeTab !== 'home' && html`
                            <div className="py-20 text-center text-[#a69685] opacity-50">
                                <${Lucide.Loader2} className="animate-spin mx-auto mb-4" />
                                <p className="text-xs uppercase tracking-widest">${activeTab} 功能對接中...</p>
                            </div>
                        `}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-[#dcd2c3] px-2 py-5 flex justify-between items-center max-w-md mx-auto z-50 rounded-t-[2.5rem] shadow-2xl">
                        ${navTabs.map(tab => html`
                            <button key=${tab.id} onClick=${() => setActiveTab(tab.id)} className=${`flex flex-col items-center gap-1 flex-1 transition-all ${activeTab === tab.id ? 'text-[#e87a90] scale-110' : 'text-[#dcd2c3]'}`}>
                                <${Lucide[tab.icon]} size=${20} strokeWidth=${activeTab === tab.id ? 3 : 2} />
                                <span className="text-[8px] font-black uppercase tracking-tighter">${tab.label}</span>
                            </button>
                        `)}
                    </nav>
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
