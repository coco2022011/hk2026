<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港。行 2026 - 雲端行程筆記</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #f5f0e6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .rotate-2 { transform: rotate(2deg); }
        @-webkit-keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fadeIn 0.5s ease-in; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzCpLLNbc1ytaytke0cvwrkRumeaCkxUo", // 這裡請填入你從 Firebase 複製的長金鑰
            authDomain: "hk-travel-1c9bc.firebaseapp.com",
            projectId: "hk-travel-1c9bc",
            storageBucket: "hk-travel-1c9bc.firebasestorage.app", // 格式對了！
            messagingSenderId: "502792710467",
            appId: "1:502792710467:web:4034ebba5a301e9777a7f6"
        };

        // 防止重複初始化
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home'); 
            const [selectedDay, setSelectedDay] = useState(1);
            const [itinerary, setItinerary] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const appId = 'hk-travel-2026-v-final-safe-v20'; // 你的 App 識別碼
            const [customRate, setCustomRate] = useState(4.15);
            const [transInput, setTransInput] = useState('');

            // 初始化 Auth 與 Lucide 圖標
            useEffect(() => {
                auth.signInAnonymously().catch(console.error);
                auth.onAuthStateChanged((u) => {
                    setUser(u);
                });
                // 網頁載入後先跑一次圖標初始化
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            // 每當切換分頁或資料變動，重新掃描圖標
            useEffect(() => {
                lucide.createIcons();
            }, [activeTab, selectedDay, itinerary]);

            // 資料訂閱 (Cloud Sync)
            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/public/data`;
                
                // 訂閱行程
                const unsubIt = db.doc(`${path}/itinerary/main`).onSnapshot(snap => {
                    if(snap.exists()) setItinerary(JSON.parse(snap.data().json));
                });
                // 訂閱記帳
                const unsubExp = db.collection(`${path}/expenses`).onSnapshot(snap => {
                    setExpenses(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp));
                });

                return () => { unsubIt(); unsubExp(); };
            }, [user]);

            // 結算邏輯
            const settlement = useMemo(() => {
                let d = 0, i = 0;
                expenses.forEach(e => {
                    const amt = (e.currency === 'HKD' ? parseFloat(e.amount) * customRate : parseFloat(e.amount)) || 0;
                    if (e.payer === 'Ding') d += amt; else i += amt;
                });
                const diff = Math.abs(d - (d + i) / 2);
                return { 
                    dTotal: d, 
                    iTotal: i, 
                    who: d > i ? { debtor: 'Iris', creditor: 'Ding', amt: diff } : { debtor: 'Ding', creditor: 'Iris', amt: diff } 
                };
            }, [expenses, customRate]);

            // 載入畫面
            if (!user || itinerary.length === 0) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-[#f5f0e6]">
                    <div className="animate-bounce text-rose-400">
                        <i data-lucide="cloud" style={{width:48, height:48}}></i>
                    </div>
                    <p className="text-stone-500 font-black text-xs mt-4 uppercase">Connecting to Hong Kong...</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto bg-[#f5f0e6] min-h-screen relative pb-32 text-[#4e3b31]">
                    <header className="pt-10 pb-6 px-6 relative flex flex-col items-center border-b border-[#ede0d4]">
                        <div className="flex items-center gap-2 mb-1">
                            <i data-lucide="anchor" className="text-[#9c6644] w-5 h-5"></i>
                            <h2 className="text-[#e87a90] text-2xl font-black tracking-widest uppercase">香港。行</h2>
                        </div>
                        <div className="absolute top-8 right-6">
                            <div className="bg-[#f2ca5e] px-4 py-1.5 rounded-full font-black text-xs shadow-md">DAY {selectedDay}</div>
                        </div>
                    </header>

                    <main className="p-4 animate-in">
                        {activeTab === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-center gap-3 mb-6">
                                    {[1, 2, 3, 4].map(d => (
                                        <button key={d} onClick={() => setSelectedDay(d)} className={`w-10 h-10 rounded-full font-black text-xs border-2 ${selectedDay === d ? 'bg-[#7f5539] text-white' : 'bg-white'}`}>{d}</button>
                                    ))}
                                </div>
                                <div className="bg-white rounded-[2rem] p-6 shadow-xl space-y-6 text-left">
                                    <div className="flex items-start gap-4">
                                        <i data-lucide="bed" className="text-rose-400 mt-1"></i>
                                        <div className="flex-1">
                                            <p className="text-[11px] font-black text-[#a69685] uppercase">Stay / 住宿</p>
                                            <h4 className="font-black text-[18px]">{itinerary[selectedDay-1]?.hotel}</h4>
                                        </div>
                                    </div>
                                </div>
                                {/* 行程項目 */}
                                {(itinerary[selectedDay-1]?.activities || []).map((act, idx) => (
                                    <div key={idx} className="bg-white rounded-[2rem] p-6 shadow-xl text-left border border-[#ede0d4]">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="text-[10px] font-black bg-slate-100 px-2 py-0.5 rounded">{act.time}</span>
                                            <h4 className="font-black text-[18px]">{act.title}</h4>
                                        </div>
                                        <p className="text-[#8e7d6f] italic text-sm">{act.notes}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'expense' && (
                            <div className="space-y-6 text-left">
                                <div className="bg-[#f2ca5e] p-5 rounded-3xl text-center shadow-lg">
                                    <h4 className="font-black">{settlement.who.debtor} 需付給 {settlement.who.creditor}</h4>
                                    <p className="text-2xl font-black">NT$ {settlement.who.amt.toFixed(0)}</p>
                                </div>
                                {expenses.map(e => (
                                    <div key={e.id} className="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-[#ede0d4]">
                                        <div className="font-black">
                                            <p>{e.title}</p>
                                            <p className="text-xs text-[#a69685]">{e.currency} {e.amount} (by {e.payer})</p>
                                        </div>
                                        <i data-lucide="receipt" className="text-[#dcd2c3]"></i>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t-2 border-[#dcd2c3] px-4 py-4 flex justify-between items-center max-w-md mx-auto z-50 rounded-t-[2.5rem]">
                        {[
                            { id: 'home', icon: 'calendar', label: '行程' },
                            { id: 'expense', icon: 'receipt', label: '記帳' },
                            { id: 'tools', icon: 'languages', label: '翻譯' }
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 transition-all ${activeTab === tab.id ? 'text-[#e87a90] scale-110' : 'text-[#dcd2c3]'}`}>
                                <i data-lucide={tab.icon} style={{width:22, height:22}}></i>
                                <span className="text-[10px] font-black uppercase">{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
