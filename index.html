<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港。行 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #f5f0e6; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .paper-texture { 
            position: fixed; inset: 0; pointer-events: none; opacity: 0.05; z-index: 100;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>

    <script type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom';
        import * as Lucide from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, collection, onSnapshot } from 'firebase/firestore';

        // 1. Firebase 配置 (請貼換為你的金鑰)
        const firebaseConfig = { 
            apiKey: "AIzaSyDvYWGfyFZb2TNbug8NXZrAzNMmv7DwlEM", 
            authDomain: "hk-travel-1c9bc.firebaseapp.com", 
            projectId: "hk-travel-1c9bc", 
            storageBucket: "hk-travel-1c9bc.firebasestorage.app", 
            messagingSenderId: "502792710467", 
            appId: "1:502792710467:web:4034ebba5a301e9777a7f6" 
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const appId = 'hk-travel-2026-v-final-safe-v20';

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [selectedDay, setSelectedDay] = useState(1);
            const [isEditing, setIsEditing] = useState(false);
            const [clickCount, setClickCount] = useState(0);

            const [itinerary, setItinerary] = useState([]);
            const [mtrGrid, setMtrGrid] = useState([]);
            const [notices, setNotices] = useState([]);

            useEffect(() => {
                signInAnonymously(auth);
                onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                // 網管規則：if (snap.exists) 不加括號
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', 'main'), (snap) => {
                    if (snap.exists) setItinerary(JSON.parse(snap.data().json || "[]"));
                });
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'mtr', 'main'), (snap) => {
                    if (snap.exists) setMtrGrid(JSON.parse(snap.data().json || "[]"));
                });
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'notices', 'main'), (snap) => {
                    if (snap.exists) setNotices(JSON.parse(snap.data().json || "[]"));
                });
            }, [user]);

            const handleHeaderClick = () => {
                setClickCount(prev => {
                    if (prev + 1 >= 5) {
                        setIsEditing(!isEditing);
                        alert(isEditing ? "編輯模式關閉" : "編輯模式開啟");
                        return 0;
                    }
                    return prev + 1;
                });
            };

            const navTabs = [
                { id: 'home', icon: 'Calendar', label: '行程' },
                { id: 'must', icon: 'ShoppingBag', label: '清單' },
                { id: 'expense', icon: 'Receipt', label: '分帳' },
                { id: 'mtr', icon: 'LayoutGrid', label: '地鐵' },
                { id: 'tools', icon: 'Languages', label: '工具' },
                { id: 'calc', icon: 'BookOpen', label: '記事' }
            ];

            if (!user) return <div className="flex h-screen items-center justify-center text-[10px] tracking-[0.5em] opacity-20">CONNECTING...</div>;

            return React.createElement('div', { className: 'max-w-md mx-auto bg-[#f5f0e6] min-h-screen relative pb-32' },
                React.createElement('div', { className: 'paper-texture' }),
                
                // Header
                React.createElement('header', { 
                    className: 'pt-12 pb-8 px-6 text-center border-b border-[#ede0d4] cursor-pointer',
                    onClick: handleHeaderClick 
                },
                    React.createElement('h2', { className: 'text-[#e87a90] text-3xl font-black tracking-[0.3em]' }, '香港迪士尼行'),
                    React.createElement('p', { className: 'text-[9px] text-[#a69685] font-black tracking-[0.5em] mt-2' }, 'MARCH 2026')
                ),

                // Main Content Area
                React.createElement('main', { className: 'p-5' },
                    isEditing && React.createElement('div', { className: 'bg-amber-100 p-2 mb-4 text-[10px] text-center font-bold rounded' }, '⚠️ 編輯模式已啟動'),
                    
                    activeTab === 'home' && React.createElement('div', null, 
                        React.createElement('div', { className: 'flex justify-center gap-3 mb-8' },
                            [1, 2, 3, 4].map(d => React.createElement('button', {
                                key: d,
                                onClick: () => setSelectedDay(d),
                                className: `w-10 h-10 rounded-xl font-black ${selectedDay === d ? 'bg-[#7f5539] text-white' : 'bg-white text-[#8e7d6f]'}`
                            }, d))
                        ),
                        itinerary.length === 0 && React.createElement('p', { className: 'text-center opacity-30 italic py-20' }, '雲端尚無行程數據...')
                    )
                ),

                // Bottom Nav
                React.createElement('nav', { className: 'fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-[#dcd2c3] px-2 py-5 flex justify-between items-center max-w-md mx-auto z-50 rounded-t-[2.5rem]' },
                    navTabs.map(tab => {
                        const IconComponent = Lucide[tab.icon];
                        return React.createElement('button', {
                            key: tab.id,
                            onClick: () => setActiveTab(tab.id),
                            className: `flex flex-col items-center gap-1 flex-1 transition-all ${activeTab === tab.id ? 'text-[#e87a90] scale-110' : 'text-[#dcd2c3]'}`
                        },
                            React.createElement(IconComponent, { size: 20 }),
                            React.createElement('span', { className: 'text-[8px] font-black' }, tab.label)
                        );
                    })
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
